# RACFS server config: MemFS + DevFS + ProxyFS
# ProxyFS forwards requests to another RACFS server (or compatible API).
# Usage: cargo run -p racfs-server -- --config examples/configs/proxyfs.toml
# Point url at another running RACFS server.

host = "127.0.0.1"
port = 8080

[mounts.memfs]
path = "/memfs"
fs_type = "memfs"

[mounts.dev]
path = "/dev"
fs_type = "devfs"

[mounts.remote]
path = "/remote"
fs_type = "proxyfs"
url = "http://localhost:9090"
