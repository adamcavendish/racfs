# RACFS server config: MemFS + DevFS + QueueFS
# QueueFS provides message queues as a filesystem: /{queue_name}/head, /{queue_name}/tail, etc.
# Usage: cargo run -p racfs-server -- --config examples/configs/queuefs.toml

host = "127.0.0.1"
port = 8080

[mounts.memfs]
path = "/memfs"
fs_type = "memfs"

[mounts.dev]
path = "/dev"
fs_type = "devfs"

[mounts.queues]
path = "/queues"
fs_type = "queuefs"
